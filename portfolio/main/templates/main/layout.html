{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% block header %}{% endblock %}
        <link rel="stylesheet" href="{% static 'main/style.css' %}">
        <!-- Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Prata&family=STIX+Two+Text:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="cursor" id="cur"></div>
        <div class="cursor-ring" id="curRing"></div>

        <!-- NAV -->
        <nav id="nav">
          <a href="{% url 'main:home' %}" class="nav-logo">Portfolio</a>
          <ul>
            <li><a href="{% url 'main:home' %}#about">About</a></li>
            <li><a href="{% url 'main:home' %}#research">Research</a></li>
            <li><a href="{% url 'main:home' %}#projects">Projects</a></li>
            <li><a href="{% url 'main:home' %}#skills">Skills</a></li>
            <li><a href="{% url 'main:home' %}#achievements">Achievements</a></li>
            <li><a href="{% url 'main:home' %}#contact">Contact</a></li>
          </ul>
          <button class="nav-menu-btn" id="navMenuBtn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </nav>

        <!-- Mobile drawer -->
        <div class="nav-drawer" id="navDrawer">
          <ul>
            <li><a href="{% url 'main:home' %}#about" onclick="closeDrawer()">About</a></li>
            <li><a href="{% url 'main:home' %}#research" onclick="closeDrawer()">Research</a></li>
            <li><a href="{% url 'main:home' %}#projects" onclick="closeDrawer()">Projects</a></li>
            <li><a href="{% url 'main:home' %}#skills" onclick="closeDrawer()">Skills</a></li>
            <li><a href="{% url 'main:home' %}#achievements" onclick="closeDrawer()">Achievements</a></li>
            <li><a href="{% url 'main:home' %}#contact" onclick="closeDrawer()">Contact</a></li>
          </ul>
        </div>
        <main>
            {% block content %}{% endblock %}
        </main>
    <footer>© 2026 Abdulla Shahzan · All rights reserved</footer>
    <script src="{% static 'main/script.js' %}"></script>
</body>
</html>
